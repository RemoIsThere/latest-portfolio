<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Playground | Rehmat Engineering</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <!-- Pyodide for Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
      :root {
        --editor-bg: #09090b;
        --sidebar-bg: #0c0c0e;
        --accent: #6366f1;
        --border: rgba(255, 255, 255, 0.1);
      }

      body {
        margin: 0;
        padding: 0;
        background: #09090b;
        color: #fff;
        font-family: "Inter", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* HEADER MATCHING PORTFOLIO */
      .site-header {
        background-color: rgba(9, 9, 11, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        height: 64px;
        display: flex;
        align-items: center;
      }

      .header-container {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 1.25rem;
        text-decoration: none;
        color: #fff;
      }

      .logo-dot {
        width: 8px;
        height: 8px;
        background-color: var(--accent);
        border-radius: 50%;
      }

      /* TOOLBAR */
      .toolbar {
        height: 56px;
        background: #111114;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        justify-content: space-between;
      }

      .lang-selector {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.03);
        padding: 4px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .lang-option {
        padding: 6px 16px;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #71717a;
      }

      .lang-option:hover {
        color: #fff;
      }

      .lang-option.active {
        background: rgba(99, 102, 241, 0.1);
        color: var(--accent);
      }

      /* MAIN CONTENT */
      .main-wrapper {
        flex: 1;
        display: flex;
        min-height: 0; /* Important for flex child with overflow */
      }

      .editor-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
      }

      #monaco-editor {
        flex: 1;
        width: 100%;
      }

      .terminal-side {
        width: 400px;
        background: #000;
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        padding: 12px 20px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #71717a;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #terminal-output {
        flex: 1;
        padding: 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        color: #e4e4e7;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.6;
        scroll-behavior: smooth;
      }

      /* BUTTONS */
      .btn-run {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-run:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-run:disabled {
        background: #27272a;
        color: #71717a;
        cursor: not-allowed;
        transform: none;
      }

      /* UTILS */
      .cursor-text {
        cursor: text !important;
      }

      .animate-spin {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-container">
        <a href="index.html" class="logo">
          <div class="logo-dot"></div>
          Rehmat Playground
        </a>
        <div style="display: flex; gap: 1rem; align-items: center">
          <div
            id="runtime-status"
            style="
              font-size: 0.75rem;
              color: #71717a;
              background: rgba(255, 255, 255, 0.03);
              padding: 4px 12px;
              border-radius: 20px;
              border: 1px solid var(--border);
            "
          >
            Initializing Runtime...
          </div>
          <button id="run-btn" class="btn-run">
            <i data-lucide="play" size="16" fill="white"></i>
            Run Code
          </button>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="lang-selector">
        <div class="lang-option active" data-lang="python">Python</div>
        <div class="lang-option" data-lang="javascript">JavaScript</div>
        <div class="lang-option" data-lang="cpp">C++</div>
        <div class="lang-option" data-lang="java">Java</div>
      </div>
      <div style="color: #71717a; font-size: 0.75rem; display: flex; gap: 20px">
        <span>Editor: Monaco v0.44</span>
        <span>Environment: Isolated Frontend</span>
      </div>
    </div>

    <div class="main-wrapper">
      <div class="editor-side">
        <div id="monaco-editor"></div>
      </div>
      <div class="terminal-side">
        <div class="terminal-header">
          <span>Output Console</span>
          <i data-lucide="terminal" size="14"></i>
        </div>
        <div id="terminal-output">System Booting...</div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      let editor;
      let pyodideInstance = null;
      let selectedLang = "python";

      const templates = {
        python:
          'import sys\nprint("Hello from Rehmat Engineering!")\nprint(f"Python Version: {sys.version}")\n\n# Dynamic Loop Test\nfor i in range(5):\n    print(f"Execution Step: {i + 1}")',
        javascript:
          'console.log("JavaScript Runtime Initialized.");\n\nconst architecture = {\n    client: "Browser",\n    engine: "V8 (Native)",\n    ui: "Monaco Editor"\n};\n\nconsole.table(architecture);\n\nconsole.log("Welcome to the Frontend Lab.");',
        cpp: '#include <iostream>\n\nint main() {\n    std::cout << "Hello from C++!" << std::endl;\n    std::cout << "Compiler: GCC (via Godbolt API)" << std::endl;\n    return 0;\n}',
        java: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello from Java!");\n        System.out.println("Execution Environment: Frontend-Driven API Wrapper");\n    }\n}',
      };

      // Initialize Monaco
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });
      require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(
          document.getElementById("monaco-editor"),
          {
            value: templates.python,
            language: "python",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', monospace",
            minimap: { enabled: false },
            padding: { top: 20 },
            lineHeight: 22,
            cursorBlinking: "expand",
            cursorSmoothCaretAnimation: "on",
            smoothScrolling: true,
            scrollbar: {
              vertical: "hidden",
              horizontal: "hidden",
            },
            backgroundColor: "#09090b",
          },
        );

        // Set background color via theme override
        monaco.editor.defineTheme("rehmat-theme", {
          base: "vs-dark",
          inherit: true,
          rules: [],
          colors: {
            "editor.background": "#09090b",
          },
        });
        monaco.editor.setTheme("rehmat-theme");

        log("Monaco Editor ready.");
      });

      // Initialize Pyodide
      async function loadPython() {
        try {
          pyodideInstance = await loadPyodide();
          log("Python WASM Runtime loaded successfully.");
          document.getElementById("runtime-status").innerText =
            "All Systems Nominal";
        } catch (err) {
          log("Failed to load Python: " + err.message);
          document.getElementById("runtime-status").innerText =
            "Error Loading Runtime";
        }
      }
      loadPython();

      // UI Event Listeners
      document.querySelectorAll(".lang-option").forEach((opt) => {
        opt.addEventListener("click", () => {
          document
            .querySelectorAll(".lang-option")
            .forEach((o) => o.classList.remove("active"));
          opt.classList.add("active");

          selectedLang = opt.dataset.lang;
          const model = editor.getModel();
          monaco.editor.setModelLanguage(
            model,
            selectedLang === "java"
              ? "java"
              : selectedLang === "cpp"
                ? "cpp"
                : selectedLang,
          );
          editor.setValue(templates[selectedLang]);

          log(`Environment switched to ${selectedLang.toUpperCase()}`);
        });
      });

      function log(msg, isError = false) {
        const out = document.getElementById("terminal-output");
        const color = isError ? "#ef4444" : "#e4e4e7";
        out.innerHTML += `\n<span style="color: ${color}">${msg}</span>`;
        out.scrollTop = out.scrollHeight;
      }

      document.getElementById("run-btn").addEventListener("click", async () => {
        const code = editor.getValue();
        const btn = document.getElementById("run-btn");
        btn.disabled = true;
        btn.innerHTML =
          '<i data-lucide="refresh-cw" class="animate-spin" size="14"></i> EXECUTING...';
        lucide.createIcons();

        try {
          if (selectedLang === "python") {
            if (!pyodideInstance) {
              log("Python environment still booting...", true);
              return;
            }
            pyodideInstance.runPython(`
import sys
import io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
                    `);
            await pyodideInstance.runPythonAsync(code);
            const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
            const stderr = pyodideInstance.runPython("sys.stderr.getvalue()");
            log(stdout || "Process finished with result code 0.");
            if (stderr) log("Error:\n" + stderr, true);
          } else if (selectedLang === "javascript") {
            let output = "";
            const fakeConsole = {
              log: (...args) => (output += args.join(" ") + "\n"),
              error: (...args) => (output += "Error: " + args.join(" ") + "\n"),
              table: (obj) => (output += JSON.stringify(obj, null, 2) + "\n"),
            };

            try {
              const func = new Function("console", code);
              func(fakeConsole);
              log(output || "Process finished with result code 0.");
            } catch (e) {
              log("Runtime Error: " + e.message, true);
            }
          } else {
            // C++ and JAVA using Godbolt Public API
            log(
              `Optimizing and transmitting ${selectedLang.toUpperCase()} stream...`,
            );

            const response = await fetch(
              "https://godbolt.org/api/compiler/g131/compile",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  source: code,
                  compiler: selectedLang === "cpp" ? "g132" : "java1900",
                  options: {
                    userArguments: "-O3",
                    executeParameters: { args: "" },
                    compilerOptions: { executorRequest: true },
                  },
                }),
              },
            );

            if (!response.ok) throw new Error("API Connection Failed");

            const data = await response.json();

            if (data.stdout && data.stdout.length > 0) {
              log(data.stdout.map((x) => x.text).join("\n"));
            }
            if (data.stderr && data.stderr.length > 0) {
              log(data.stderr.map((x) => x.text).join("\n"), true);
            }
            if (!data.stdout.length && !data.stderr.length) {
              log("Process finished with result code 0.");
            }
          }
        } catch (err) {
          log("Fatal Error: " + err.message, true);
        } finally {
          btn.disabled = false;
          btn.innerHTML =
            '<i data-lucide="play" size="16" fill="white"></i> Run Code';
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
