<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground | Rehmat Engineering</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <!-- Pyodide for Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
      :root {
        --editor-bg: #09090b;
        --sidebar-bg: #0c0c0e;
        --accent: #10b981; /* Premium Green Accent */
        --accent-glow: rgba(16, 185, 129, 0.15);
        --border: rgba(255, 255, 255, 0.08);
        --text-muted: #71717a;
        --font-main: "Outfit", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      body {
        margin: 0;
        padding: 0;
        background: #050505;
        color: #fff;
        font-family: var(--font-main);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* PREMIUM UI ELEMENTS */
      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
      }

      .glow-text {
        text-shadow: 0 0 20px var(--accent-glow);
      }

      /* HEADER MATCHING PORTFOLIO */
      .site-header {
        background-color: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        height: 64px;
        display: flex;
        align-items: center;
        z-index: 1000;
      }

      .header-container {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 1.25rem;
        text-decoration: none;
        color: #fff;
        letter-spacing: -0.02em;
      }

      .logo-dot {
        width: 8px;
        height: 8px;
        background-color: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--accent);
      }

      /* MAIN LAYOUT */
      .app-container {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* SIDEBAR */
      .sidebar {
        width: 72px;
        background: #09090b;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
        gap: 12px;
        z-index: 100;
      }

      .tool-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: var(--text-muted);
        border: 1px solid transparent;
        position: relative;
      }

      .tool-btn:hover {
        color: var(--accent);
        background: rgba(16, 185, 129, 0.05);
      }

      .tool-btn.active {
        color: #fff;
        background: var(--accent);
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .tool-btn span.tooltip {
        position: absolute;
        left: 80px;
        background: #18181b;
        color: #fff;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.75rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.2s ease;
        transform: translateX(-10px);
        border: 1px solid var(--border);
        z-index: 1000;
      }

      .tool-btn:hover span.tooltip {
        opacity: 1;
        transform: translateX(0);
      }

      /* EDITOR WORKSPACE */
      .workspace {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--editor-bg);
        position: relative;
      }

      .workspace-header {
        height: 48px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
        background: rgba(9, 9, 11, 0.5);
      }

      .tab-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
      }

      #monaco-editor-wrapper {
        flex: 1;
        width: 100%;
        position: relative;
      }

      /* OUTPUT PANEL */
      .output-panel {
        height: 35%;
        background: #000;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .output-header {
        height: 40px;
        background: #09090b;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }

      #terminal-output {
        flex: 1;
        padding: 20px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: #d4d4d8;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.6;
        background: radial-gradient(
          circle at top left,
          rgba(16, 185, 129, 0.02),
          transparent 40%
        );
      }

      /* RUN BUTTON */
      .run-button {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 8px 24px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 15px var(--accent-glow);
      }

      .run-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 25px var(--accent-glow);
      }

      .run-button:active {
        transform: translateY(0);
      }

      .run-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #27272a;
        color: #71717a;
        box-shadow: none;
      }

      /* DECORATIONS */
      .mesh-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(16, 185, 129, 0.05) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(16, 185, 129, 0.05) 0px,
            transparent 50%
          );
        pointer-events: none;
        opacity: 0.5;
      }

      /* MONACO OVERRIDES */
      .monaco-editor,
      .monaco-editor-background,
      .monaco-editor .inputarea.ime-input {
        background-color: var(--editor-bg) !important;
      }

      /* CUSTOM SCROLLBAR */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      /* ANIMATIONS */
      @keyframes pulse {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }
      .status-pulse {
        animation: pulse 2s infinite;
      }

      .animate-spin {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="mesh-bg"></div>

    <header class="site-header">
      <div class="header-container">
        <a href="index.html" class="logo">
          <div class="logo-dot"></div>
          <span class="glow-text">Rehmat Playground</span>
        </a>

        <div style="display: flex; gap: 20px; align-items: center">
          <div
            id="status-chip"
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 6px 14px;
              background: rgba(255, 255, 255, 0.03);
              border-radius: 30px;
              border: 1px solid var(--border);
              font-size: 0.75rem;
              font-weight: 600;
              color: var(--text-muted);
            "
          >
            <span
              id="status-indicator"
              style="
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #f59e0b;
              "
              class="status-pulse"
            ></span>
            <span id="status-text">Booting Engine...</span>
          </div>

          <button id="run-btn" class="run-button" disabled>
            <i data-lucide="play" size="14" fill="currentColor"></i>
            Execute Code
          </button>
        </div>
      </div>
    </header>

    <div class="app-container">
      <aside class="sidebar">
        <div class="tool-btn active" data-lang="python">
          <i data-lucide="terminal" size="20"></i>
          <span class="tooltip">Python (WASM)</span>
        </div>
        <div class="tool-btn" data-lang="javascript">
          <i data-lucide="code" size="20"></i>
          <span class="tooltip">JavaScript (Blink)</span>
        </div>
        <div class="tool-btn" data-lang="cpp">
          <i data-lucide="cpu" size="20"></i>
          <span class="tooltip">C++ (GCC 13)</span>
        </div>
        <div class="tool-btn" data-lang="java">
          <i data-lucide="coffee" size="20"></i>
          <span class="tooltip">Java (JDK 21)</span>
        </div>

        <div style="margin-top: auto; padding-bottom: 10px">
          <div class="tool-btn" onclick="clearOutput()">
            <i data-lucide="trash-2" size="20"></i>
            <span class="tooltip">Clear Console</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace-header">
          <div class="tab-indicator">
            <i
              data-lucide="file-code"
              size="14"
              style="color: var(--accent)"
            ></i>
            <span id="current-filename">main.py</span>
          </div>
          <div
            style="
              display: flex;
              gap: 15px;
              font-size: 0.7rem;
              color: var(--text-muted);
              font-weight: 500;
            "
          >
            <span>UTF-8</span>
            <span id="active-lang-text">PYTHON 3.11</span>
          </div>
        </div>

        <div id="monaco-editor-wrapper">
          <div id="monaco-editor" style="height: 100%"></div>
        </div>

        <section class="output-panel">
          <div class="output-header">
            <div style="display: flex; align-items: center; gap: 8px">
              <i data-lucide="terminal" size="12"></i>
              <span>System Console Output</span>
            </div>
          </div>
          <div id="terminal-output">
            >> Rehmat Engineering Runtime [v2.0.4]...
          </div>
        </section>
      </main>
    </div>

    <!-- SCRIPTS -->
    <script>
      // Init Icons
      lucide.createIcons();

      let editor;
      let pyodideInstance = null;
      let currentLang = "python";

      const templates = {
        python:
          'import math\n\ndef calculate_fibonacci(n):\n    fib = [0, 1]\n    for i in range(2, n):\n        fib.append(fib[i-1] + fib[i-2])\n    return fib\n\nprint(">> Executing Fibonacci Calculation...")\nresult = calculate_fibonacci(10)\nprint(f"Result: {result}")\n\nprint(f"Math Constants: Pi = {math.pi}")',
        javascript:
          "// High-Performance JavaScript Lab\n\nfunction benchmark() {\n    const start = performance.now();\n    let sum = 0;\n    for(let i = 0; i < 1000000; i++) {\n        sum += Math.sqrt(i);\n    }\n    const end = performance.now();\n    return (end - start).toFixed(4);\n}\n\nconsole.log(`>> Execution started...`);\nconst time = benchmark();\nconsole.log(`>> Computed 1M square roots in ${time} ms`);",
        cpp: '#include <iostream>\n#include <vector>\n\nint main() {\n    std::cout << ">> C++ Core Initialized" << std::endl;\n    \n    std::vector<std::string> tech = {"GCC 13", "WASM", "Rehmat Engine"};\n    \n    for(const auto& t : tech) {\n        std::cout << "Integrating: " << t << std::endl;\n    }\n    \n    return 0;\n}',
        java: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println(">> Java Virtual Machine Simulator Booted");\n        \n        var message = "Building educational architectures.";\n        System.out.println("Status: " + message);\n        \n        for(int i=1; i<=3; i++) {\n            System.out.println("Self-test sequence " + i + " PASSED");\n        }\n    }\n}',
      };

      // Initialize Monaco
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });
      require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(
          document.getElementById("monaco-editor"),
          {
            value: templates.python,
            language: "python",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', monospace",
            minimap: { enabled: false },
            padding: { top: 20 },
            lineNumbersMinChars: 3,
            scrollBeyondLastLine: false,
            cursorBlinking: "smooth",
            cursorSmoothCaretAnimation: "on",
            renderLineHighlight: "all",
            contextmenu: false,
            scrollbar: {
              vertical: "visible",
              horizontal: "hidden",
              useShadows: false,
              verticalScrollbarSize: 8,
            },
          },
        );

        monaco.editor.defineTheme("rehmat-green", {
          base: "vs-dark",
          inherit: true,
          rules: [
            { token: "comment", foreground: "6272a4" },
            { token: "keyword", foreground: "10b981" },
          ],
          colors: {
            "editor.background": "#09090b",
            "editor.lineHighlightBackground": "#ffffff05",
            "editorCursor.foreground": "#10b981",
            "editor.selectionBackground": "#10b98133",
          },
        });
        monaco.editor.setTheme("rehmat-green");

        log("Core Editor Components Ready.");
        checkReady();
      });

      // Load Pyodide (Python WASM)
      async function initPython() {
        try {
          pyodideInstance = await loadPyodide();
          // Pre-load standard output redirect
          await pyodideInstance.runPythonAsync(`
import sys
import io
class Tee(io.StringIO):
    def __init__(self, *args, **kwargs):
        super().__init__(*args, **kwargs)
    def write(self, s):
        return super().write(s)
`);
          log("Python WASM Runtime Ready.");
          checkReady();
        } catch (e) {
          log("Python Hub Failed: " + e.message, true);
        }
      }
      initPython();

      function checkReady() {
        if (editor && (pyodideInstance || currentLang !== "python")) {
          document.getElementById("status-indicator").style.background =
            "#10b981";
          document
            .getElementById("status-indicator")
            .classList.remove("status-pulse");
          document.getElementById("status-text").innerText =
            "Environment Ready";
          document.getElementById("run-btn").disabled = false;
        }
      }

      // Language Buttons
      document.querySelectorAll(".tool-btn[data-lang]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tool-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          const lang = btn.dataset.lang;
          currentLang = lang;

          // UI Updates
          const extensions = {
            python: "main.py",
            javascript: "script.js",
            cpp: "main.cpp",
            java: "Main.java",
          };
          const titles = {
            python: "PYTHON 3.11",
            javascript: "JS (ECMASCRIPT)",
            cpp: "C++ (GCC 13)",
            java: "JAVA (OPENJDK)",
          };

          document.getElementById("current-filename").innerText =
            extensions[lang];
          document.getElementById("active-lang-text").innerText = titles[lang];

          const monacoMap = {
            python: "python",
            javascript: "javascript",
            cpp: "cpp",
            java: "java",
          };
          monaco.editor.setModelLanguage(editor.getModel(), monacoMap[lang]);
          editor.setValue(templates[lang]);

          log(`Context Switched: ${titles[lang]}`);
          checkReady();
        });
      });

      function log(msg, isError = false) {
        const out = document.getElementById("terminal-output");
        const time = new Date().toLocaleTimeString([], { hour12: false });
        const color = isError ? "#ef4444" : "#a1a1aa";
        const logMsg = `\n<span style="color: #4b5563">[${time}]</span> <span style="color: ${color}">${msg}</span>`;
        out.innerHTML += logMsg;
        out.scrollTop = out.scrollHeight;
      }

      function clearOutput() {
        document.getElementById("terminal-output").innerHTML =
          ">> Console Cleared. Ready.";
      }

      // EXECUTION ENGINE
      document.getElementById("run-btn").addEventListener("click", async () => {
        const code = editor.getValue();
        const btn = document.getElementById("run-btn");
        btn.disabled = true;
        btn.innerHTML =
          '<i data-lucide="loader-2" class="animate-spin" size="14"></i> EXECUTING';
        lucide.createIcons();

        try {
          if (currentLang === "python") {
            // Python WASM Execution
            await pyodideInstance.runPythonAsync(`
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);
            try {
              await pyodideInstance.runPythonAsync(code);
              const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
              const stderr = pyodideInstance.runPython("sys.stderr.getvalue()");
              if (stdout) log(stdout);
              if (stderr) log(stderr, true);
              if (!stdout && !stderr) log("Process completed (no output).");
            } catch (e) {
              log(e.toString(), true);
            }
          } else if (currentLang === "javascript") {
            // JavaScript Sandbox Execution
            let jsBuffer = "";
            const customConsole = {
              log: (...args) =>
                (jsBuffer +=
                  args
                    .map((a) => (typeof a === "object" ? JSON.stringify(a) : a))
                    .join(" ") + "\n"),
              error: (...args) =>
                (jsBuffer += "[Error] " + args.join(" ") + "\n"),
            };

            try {
              // Using Function constructor for a bit of isolation
              const run = new Function("console", code);
              run(customConsole);
              log(jsBuffer || "Process completed (no output).");
            } catch (e) {
              log(`Runtime Exception: ${e.message}`, true);
            }
          } else {
            // C++ & Java via Godbolt API (Compiler Explorer)
            log(`Optimizing ${currentLang.toUpperCase()} binary...`);

            const compilerMap = { cpp: "g132", java: "java2100" };

            const response = await fetch(
              `https://godbolt.org/api/compiler/${compilerMap[currentLang]}/compile`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  source: code,
                  options: {
                    userArguments: "-O3",
                    executeParameters: { args: "" },
                    compilerOptions: { executorRequest: true },
                  },
                }),
              },
            );

            if (!response.ok) throw new Error("Connection to compiler lost.");

            const result = await response.json();

            if (result.stdout && result.stdout.length > 0) {
              log(result.stdout.map((x) => x.text).join("\n"));
            }
            if (result.stderr && result.stderr.length > 0) {
              log(result.stderr.map((x) => x.text).join("\n"), true);
            }
            if (result.stdout.length === 0 && result.stderr.length === 0) {
              log("Binary executed successfully.");
            }
          }
        } catch (err) {
          log(`System Error: ${err.message}`, true);
        } finally {
          btn.disabled = false;
          btn.innerHTML =
            '<i data-lucide="play" size="14" fill="currentColor"></i> Execute Code';
          lucide.createIcons();
        }
      });

      // Entrance Animation
      window.addEventListener("load", () => {
        gsap.from(".sidebar", {
          x: -80,
          opacity: 0,
          duration: 1,
          ease: "expo.out",
        });
        gsap.from(".site-header", {
          y: -64,
          opacity: 0,
          duration: 1,
          ease: "expo.out",
        });
        gsap.from(".workspace", {
          opacity: 0,
          scale: 0.98,
          duration: 1.2,
          ease: "power4.out",
          delay: 0.2,
        });
      });
    </script>
  </body>
</html>
