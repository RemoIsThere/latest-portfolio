<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground | Rehmat Engineering</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <!-- Pyodide for Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
      :root {
        --bg-deep: #050505;
        --bg-surface: #0a0a0c;
        --bg-elevated: #111114;
        --accent: #10b981;
        --accent-glow: rgba(16, 185, 129, 0.2);
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #e4e4e7;
        --text-dim: #71717a;
        --font-main: "Outfit", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --sidebar-width: 80px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-deep);
        color: var(--text-main);
        font-family: var(--font-main);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* UTILS */
      .flex-center {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
      }
      .border-glow {
        border: 1px solid var(--accent);
        box-shadow: 0 0 10px var(--accent-glow);
      }

      /* HEADER */
      .site-header {
        height: 64px;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(12px);
        z-index: 1000;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: #fff;
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: -0.02em;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--accent);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 30px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-dim);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ef4444; /* Default to error/not ready */
        transition: background 0.3s ease;
      }

      .status-dot.active {
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      .status-dot.busy {
        background: #f59e0b;
      }

      /* RUN BUTTON */
      .run-btn {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 10px 24px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .run-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px var(--accent-glow);
        filter: brightness(1.1);
      }

      .run-btn:active {
        transform: translateY(0);
      }
      .run-btn:disabled {
        background: #18181b;
        color: #52525b;
        box-shadow: none;
        cursor: not-allowed;
      }

      /* MAIN APP AREA */
      .app-main {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* SIDEBAR (NAV) */
      .nav-sidebar {
        width: var(--sidebar-width);
        background: var(--bg-surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 0;
        gap: 20px;
      }

      .nav-item {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        color: var(--text-dim);
        border: 1px solid transparent;
        position: relative;
      }

      .nav-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
      }

      .nav-item.active {
        color: var(--accent);
        background: var(--accent-glow);
        border-color: rgba(16, 185, 129, 0.3);
      }

      .nav-tooltip {
        position: absolute;
        left: 70px;
        background: #18181b;
        color: #fff;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.75rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transform: translateX(-10px);
        transition: all 0.2s ease;
        border: 1px solid var(--border);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        z-index: 1000;
      }

      .nav-item:hover .nav-tooltip {
        opacity: 1;
        transform: translateX(0);
      }

      /* EDITOR WORKSPACE */
      .editor-workspace {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-deep);
      }

      .workspace-tabs {
        height: 44px;
        background: #09090b;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 0.8rem;
        font-weight: 500;
      }

      .tab i {
        color: var(--accent);
      }

      #monaco-mount {
        flex: 1;
        width: 100%;
        position: relative;
      }

      /* CONSOLE PANEL */
      .console-panel {
        height: 35%;
        min-height: 150px;
        background: #000;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .console-header {
        height: 40px;
        background: #08080a;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        font-weight: 700;
      }

      #console-output {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        line-height: 1.6;
        color: #d4d4d8;
        background: radial-gradient(
          circle at 0px 0px,
          rgba(16, 185, 129, 0.05),
          transparent 400px
        );
      }

      .log-entry {
        margin-bottom: 4px;
        display: flex;
        gap: 12px;
      }
      .log-time {
        color: #3f3f46;
        min-width: 65px;
      }
      .log-error {
        color: #ef4444;
      }
      .log-warn {
        color: #f59e0b;
      }
      .log-system {
        color: var(--accent);
        font-weight: 500;
      }

      /* DECORATIONS */
      .grid-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      /* MONACO OVERRIDES */
      .monaco-editor,
      .monaco-editor-background,
      .monaco-editor .inputarea.ime-input {
        background-color: transparent !important;
      }

      /* ANIMATIONS */
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        animation: rotate 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>

    <header class="site-header">
      <a href="index.html" class="brand">
        <div class="brand-dot"></div>
        <span>Rehmat Engineering Playground</span>
      </a>

      <div class="header-actions">
        <div class="status-badge">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-text">SYSTEM OFFLINE</span>
        </div>

        <button id="run-btn" class="run-btn" disabled>
          <i data-lucide="play" size="16" fill="currentColor"></i>
          RUN PROJECT
        </button>
      </div>
    </header>

    <div class="app-main">
      <nav class="nav-sidebar">
        <div class="nav-item active" data-lang="python">
          <i data-lucide="terminal" size="22"></i>
          <span class="nav-tooltip">Python (Native WASM)</span>
        </div>
        <div class="nav-item" data-lang="javascript">
          <i data-lucide="code" size="22"></i>
          <span class="nav-tooltip">JavaScript (Blink Core)</span>
        </div>
        <div class="nav-item" data-lang="cpp">
          <i data-lucide="cpu" size="22"></i>
          <span class="nav-tooltip">C++ (GCC 13.2)</span>
        </div>
        <div class="nav-item" data-lang="java">
          <i data-lucide="coffee" size="22"></i>
          <span class="nav-tooltip">Java (JDK 21)</span>
        </div>

        <div style="margin-top: auto">
          <div class="nav-item" onclick="clearConsole()">
            <i data-lucide="trash-2" size="20"></i>
            <span class="nav-tooltip">Format Console</span>
          </div>
        </div>
      </nav>

      <section class="editor-workspace">
        <div class="workspace-tabs">
          <div class="tab">
            <i data-lucide="file-json" size="14"></i>
            <span id="file-name">main.py</span>
          </div>
          <div
            style="
              display: flex;
              gap: 20px;
              font-size: 0.65rem;
              color: var(--text-dim);
              font-weight: 600;
              letter-spacing: 0.05em;
            "
          >
            <span
              >RUNTIME:
              <span id="runtime-label" style="color: #fff"
                >PYTHON 3.11</span
              ></span
            >
            <span>UTF-8</span>
          </div>
        </div>

        <div id="monaco-mount"></div>

        <div class="console-panel">
          <div class="console-header">
            <div style="display: flex; align-items: center; gap: 8px">
              <i
                data-lucide="terminal"
                size="12"
                style="color: var(--accent)"
              ></i>
              <span>Execution log v2.1.0</span>
            </div>
            <div
              id="execution-time"
              style="color: var(--text-dim); text-transform: none"
            >
              Ready
            </div>
          </div>
          <div id="console-output">
            <div class="log-entry">
              <span class="log-time">00:00:00</span>
              <span class="log-system"
                >Welcome to Rehmat Playground. Establishing secure
                runtime...</span
              >
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- CODE LOGIC -->
    <script>
      lucide.createIcons();

      let editor;
      let pyodide;
      let activeLang = "python";

      const starters = {
        python:
          'import sys\nimport math\n\ndef main():\n    print(">> HELLO FROM REHMAT ENGINEERING")\n    print(f"PI CONSTANT: {math.pi}")\n    \n    # Test Loop\n    for i in range(1, 4):\n        print(f"Self-Check Sequence: {i}/3")\n    \n    return "EXECUTION_COMPLETE"\n\nif __name__ == "__main__":\n    status = main()\n    print(f">> Status Code: {status}")',
        javascript:
          '// High-Performance JavaScript Sandbox\n\nconst greet = (user) => {\n    console.log(`>> Hello, ${user}!`);\n    console.log(`>> Runtime: ${navigator.userAgent.slice(0, 30)}...`);\n};\n\ngreet("Lead Developer");\n\n// Capture Table Data\nconsole.table([\n    { layer: "UI", tech: "Monaco" },\n    { layer: "Logic", tech: "V8" }\n]);',
        cpp: '#include <iostream>\n#include <vector>\n#include <string>\n\nint main() {\n    std::cout << ">> C++ SYSTEM BOOTED" << std::endl;\n    \n    std::vector<std::string> modules = {"MEMORY", "POINTERS", "STREAMS"};\n    \n    for(const auto& m : modules) {\n        std::cout << "CHECKING MODULE: " << m << "... OK" << std::endl;\n    }\n    \n    std::cout << ">> READY FOR DEPLOYMENT" << std::endl;\n    return 0;\n}',
        java: 'import java.util.*;\n\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println(">> JAVA SE 21 ENVIRONMENT READY");\n        \n        List<String> logs = Arrays.asList("INIT", "SYNC", "DONE");\n        logs.forEach(msg -> System.out.println("LOG: " + msg));\n        \n        System.out.println(">> SYSTEM STATUS: NOMINAL");\n    }\n}',
      };

      // Initialize Monaco
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });
      require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(document.getElementById("monaco-mount"), {
          value: starters.python,
          language: "python",
          theme: "vs-dark",
          automaticLayout: true,
          fontSize: 14,
          fontFamily: "'JetBrains Mono', monospace",
          minimap: { enabled: false },
          padding: { top: 24 },
          lineNumbersMinChars: 4,
          renderLineHighlight: "all",
          scrollBeyondLastLine: false,
          cursorBlinking: "smooth",
          cursorSmoothCaretAnimation: true,
          scrollbar: {
            vertical: "visible",
            verticalScrollbarSize: 8,
            useShadows: false,
          },
        });

        monaco.editor.defineTheme("rehmat-green", {
          base: "vs-dark",
          inherit: true,
          rules: [
            { token: "keyword", foreground: "10b981", fontStyle: "bold" },
            { token: "string", foreground: "a1a1aa" },
            { token: "comment", foreground: "3f3f46" },
          ],
          colors: {
            "editor.background": "#05050500",
            "editor.lineHighlightBackground": "#ffffff04",
            "editorCursor.foreground": "#10b981",
            "editor.selectionBackground": "#10b98133",
            "editorLineNumber.foreground": "#27272a",
            "editorLineNumber.activeForeground": "#71717a",
          },
        });
        monaco.editor.setTheme("rehmat-green");

        updateStatus("Editor Synced.");
        checkSystemReady();
      });

      // Load Python WASM
      async function bootPython() {
        try {
          pyodide = await loadPyodide();
          // Inject Global Utils
          await pyodide.runPythonAsync(`
import sys, io
def setup_streams():
    sys.stdout = io.StringIO()
    sys.stderr = io.StringIO()
setup_streams()
`);
          updateStatus("Python Engine Ready.");
          checkSystemReady();
        } catch (err) {
          log("CRITICAL: Python Engine Failed to boot.", "error");
        }
      }
      bootPython();

      function checkSystemReady() {
        if (editor && (pyodide || activeLang !== "python")) {
          const dot = document.getElementById("status-dot");
          dot.className = "status-dot active";
          document.getElementById("status-text").innerText = "CORE READY";
          document.getElementById("run-btn").disabled = false;
        }
      }

      function updateStatus(txt) {
        log(txt, "system");
      }

      // Sidebar Nav
      document.querySelectorAll(".nav-item[data-lang]").forEach((item) => {
        item.addEventListener("click", () => {
          document
            .querySelectorAll(".nav-item")
            .forEach((n) => n.classList.remove("active"));
          item.classList.add("active");

          activeLang = item.dataset.lang;

          // UI
          const ext = {
            python: "main.py",
            javascript: "script.js",
            cpp: "main.cpp",
            java: "Main.java",
          };
          const label = {
            python: "PYTHON 3.11",
            javascript: "JS ENGINE",
            cpp: "GCC 13.2",
            java: "JDK 21",
          };

          document.getElementById("file-name").innerText = ext[activeLang];
          document.getElementById("runtime-label").innerText =
            label[activeLang];

          const mMode =
            activeLang === "java"
              ? "java"
              : activeLang === "cpp"
                ? "cpp"
                : activeLang;
          monaco.editor.setModelLanguage(editor.getModel(), mMode);
          editor.setValue(starters[activeLang]);

          log(`Environment Switched to ${label[activeLang]}`, "system");
          checkSystemReady();
        });
      });

      // CONSOLE LOGGING
      function log(msg, type = "default") {
        const out = document.getElementById("console-output");
        const time = new Date().toLocaleTimeString([], { hour12: false });

        const div = document.createElement("div");
        div.className = "log-entry";

        let colorClass = "";
        if (type === "error") colorClass = "log-error";
        if (type === "warn") colorClass = "log-warn";
        if (type === "system") colorClass = "log-system";

        div.innerHTML = `<span class="log-time">${time}</span><span class="${colorClass}">${msg}</span>`;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
      }

      function clearConsole() {
        document.getElementById("console-output").innerHTML = "";
        log("Console formatting complete.", "system");
      }

      // EXECUTION CONTROLLER
      document.getElementById("run-btn").addEventListener("click", async () => {
        const code = editor.getValue();
        const btn = document.getElementById("run-btn");
        const startTime = performance.now();

        btn.disabled = true;
        btn.innerHTML =
          '<i data-lucide="refresh-cw" class="spin" size="16"></i> RUNNING...';
        lucide.createIcons();

        document.getElementById("status-dot").className = "status-dot busy";
        document.getElementById("execution-time").innerText = "Executing...";

        try {
          if (activeLang === "python") {
            // Reset buffers
            await pyodide.runPythonAsync(`setup_streams()`);
            try {
              await pyodide.runPythonAsync(code);
              const stdout = pyodide.runPython("sys.stdout.getvalue()");
              const stderr = pyodide.runPython("sys.stderr.getvalue()");

              if (stdout) log(stdout);
              if (stderr) log(stderr, "error");
              if (!stdout && !stderr)
                log("Execution successful (no output).", "system");
            } catch (e) {
              log(e.toString(), "error");
            }
          } else if (activeLang === "javascript") {
            let buffer = "";
            const mockConsole = {
              log: (...args) =>
                (buffer +=
                  args
                    .map((a) => (typeof a === "object" ? JSON.stringify(a) : a))
                    .join(" ") + "\n"),
              error: (...args) =>
                (buffer += "[ERROR] " + args.join(" ") + "\n"),
              table: (data) =>
                (buffer += "TABLE:\n" + JSON.stringify(data, null, 2) + "\n"),
            };

            try {
              const script = new Function("console", code);
              script(mockConsole);
              log(buffer || "Execution successful (no output).");
            } catch (e) {
              log(`Runtime Error: ${e.message}`, "error");
            }
          } else {
            // C++ & Java (Compiler Explorer Full Implementation)
            log(`Transmitting stream to remote build cluster...`, "system");

            const compiler = activeLang === "cpp" ? "g132" : "java2100";
            const response = await fetch(
              `https://godbolt.org/api/compiler/${compiler}/compile`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  source: code,
                  options: {
                    userArguments: "-O3",
                    executeParameters: { args: "" },
                    compilerOptions: { executorRequest: true },
                  },
                }),
              },
            );

            if (!response.ok) throw new Error("Cluster Connection Error.");

            const data = await response.json();

            if (data.stdout && data.stdout.length) {
              log(data.stdout.map((x) => x.text).join("\n"));
            }
            if (data.stderr && data.stderr.length) {
              log(data.stderr.map((x) => x.text).join("\n"), "error");
            }
            if (
              data.compilationServiceResponse &&
              !data.stdout.length &&
              !data.stderr.length
            ) {
              log("Project verified and executed successfully.", "system");
            }
          }
        } catch (err) {
          log(`Fatal Hook Error: ${err.message}`, "error");
        } finally {
          const duration = ((performance.now() - startTime) / 1000).toFixed(2);
          document.getElementById("execution-time").innerText =
            `Finished in ${duration}s`;
          document.getElementById("status-dot").className = "status-dot active";
          btn.disabled = false;
          btn.innerHTML =
            '<i data-lucide="play" size="16" fill="currentColor"></i> RUN PROJECT';
          lucide.createIcons();
        }
      });

      // Entrance
      window.onload = () => {
        gsap.from(".nav-sidebar", {
          x: -100,
          opacity: 0,
          duration: 1.2,
          ease: "expo.out",
        });
        gsap.from(".site-header", {
          y: -70,
          opacity: 0,
          duration: 1,
          ease: "power3.out",
        });
        gsap.from(".editor-workspace", {
          opacity: 0,
          y: 30,
          duration: 1,
          delay: 0.3,
          ease: "power2.out",
        });
      };
    </script>
  </body>
</html>
